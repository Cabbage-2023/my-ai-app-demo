# ============================================================
# 系统 Nginx 配置（非 Docker）
# 部署路径：/etc/nginx/sites-available/ai-app
# 启用：sudo ln -sf /etc/nginx/sites-available/ai-app /etc/nginx/sites-enabled/
# 重启：sudo systemctl restart nginx
# ============================================================

server {
    listen 80;
    server_name 192.144.232.63;

    # ── 问卷系统 B 端（管理后台） ──
    location / {
        root /home/ubuntu/wenjuan-platform/client-b;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── 问卷系统 C 端（用户端） ──
    location /question/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── 问卷系统 C 端静态资源 ──
    location /_next/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── 问卷系统 API ──
    location /api/ {
        proxy_pass http://127.0.0.1:3005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
