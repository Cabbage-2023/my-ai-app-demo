name: Deploy

on:
  push:
    branches: [main]
    # 排除纯文档修改，节省 CI 时间
    paths-ignore:
      - "**.md"
      - "项目计划.md"
      - "开发日程.md"
  workflow_dispatch: # 手动触发

# 原使用 ghcr.io 镜像路线（因最初服务器 git clone 太慢 >10 分钟）
# 后改为服务器 git pull 源码 + 本地 docker compose build，传输量更小
# 保留此段作为备用
# env:
#   REGISTRY: ghcr.io
#   IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            cd /opt/my-ai-app-demo

            echo "📦 Pulling latest code..."
            for i in 1 2 3; do
              git pull origin main && break
              echo "⚠️ git pull 失败 (attempt $i/3)，5 秒后重试..."
              sleep 5
              if [ $i -eq 3 ]; then
                echo "❌ git pull 三次均失败，中止部署"
                exit 1
              fi
            done

            echo "🔨 Building and restarting..."
            docker compose up -d --build app
            docker image prune -f
            echo "✅ Deploy complete"
