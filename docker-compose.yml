services:
  # ── Qdrant 向量数据库 ──
  qdrant:
    image: qdrant/qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    expose:
      - "6333"
      - "6334"
    ports:
      - "3933:6333"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Next.js 应用 ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CACHE_BUST: ${CACHE_BUST:-1}
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      - HOSTNAME=0.0.0.0
    depends_on:
      qdrant:
        condition: service_healthy
    ports:
      - "3039:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/ai/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  qdrant_data:
    external: true
    name: qdrant_data
